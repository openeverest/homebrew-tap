name: Update Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update to (e.g. 1.14.0). Pre-releases are rejected."
        required: true
        type: string
  repository_dispatch:
    types: [new-release]

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve target version
        id: version
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="$DISPATCH_VERSION"
          else
            VERSION="$PAYLOAD_VERSION"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "ERROR: no version supplied." >&2
            exit 1
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: version '$VERSION' is not a GA semver (X.Y.Z); refusing." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=${VERSION%.*}" >> "$GITHUB_OUTPUT"
          echo "Targeting version: $VERSION"

      - name: Run update-formula.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-formula.sh "${{ steps.version.outputs.version }}"

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@f1cc9df7a62b7f6244414d21a3ebc3ba9156a082 # main

      - name: brew style
        run: brew style ./Formula

      - name: brew audit
        env:
          MAJOR_MINOR: ${{ steps.version.outputs.major_minor }}
        run: |
          brew tap-new openeverest/local --no-git
          tap_dir="$(brew --repository openeverest/local)/Formula"
          cp Formula/everestctl.rb "$tap_dir/"
          cp "Formula/everestctl@${MAJOR_MINOR}.rb" "$tap_dir/"
          brew audit --strict --online openeverest/local/everestctl
          brew audit --strict --online "openeverest/local/everestctl@${MAJOR_MINOR}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "everestctl ${{ steps.version.outputs.version }}"
          git push
